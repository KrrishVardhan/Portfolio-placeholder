<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post — Krrishvardhan Vyas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../root.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- marked.js for Markdown → HTML rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans, 'Inter', system-ui, sans-serif);
            font-size: 15px;
            line-height: 1.65;
            letter-spacing: -0.01em;
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px;
            background: var(--background);
            color: var(--foreground);
            transition: background 0.3s, color 0.3s;
        }

        a { color: var(--accent-foreground); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Dark toggle */
        #darkToggle {
            float: right;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 7px 9px;
            cursor: pointer;
            color: var(--foreground);
            display: inline-flex;
            align-items: center;
            transition: background 0.15s;
        }
        #darkToggle:hover { background: var(--secondary); }
        #darkToggle svg { width: 16px; height: 16px; }

        /* Buttons */
        .btn {
            background: var(--secondary);
            color: var(--secondary-foreground);
            padding: 9px 17px;
            border: none;
            cursor: pointer;
            border-radius: 2px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s, transform 0.1s;
            text-decoration: none;
        }
        .btn:hover { background: var(--foreground); color: var(--background); text-decoration: none; }
        .btn:active { transform: scale(0.97); }

        /* Page sections */
        .section {
            margin: 44px 0;
            padding-bottom: 44px;
            border-bottom: 1px solid var(--border);
        }
        .section:last-child { border-bottom: none; padding-bottom: 0; }

        /* Nav bar above the post */
        .post-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        /* Post metadata header */
        .post-header { margin-bottom: 36px; }

        .post-meta {
            font-size: 0.8rem;
            color: var(--muted-foreground);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .post-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1.2;
            color: var(--foreground);
            margin-bottom: 12px;
        }

        .tag {
            display: inline-block;
            background: var(--secondary);
            color: var(--secondary-foreground);
            border-radius: 2px;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 2px 8px;
            letter-spacing: 0.02em;
        }
        .tags { display: flex; flex-wrap: wrap; gap: 5px; }

        /* ---- Markdown-rendered prose ---- */
        #post-content { max-width: 680px; }

        #post-content h1, #post-content h2, #post-content h3,
        #post-content h4, #post-content h5, #post-content h6 {
            color: var(--foreground);
            font-weight: 600;
            letter-spacing: -0.015em;
            margin: 2em 0 0.6em;
            line-height: 1.3;
        }
        #post-content h1 { font-size: 1.75rem; margin-top: 0; }
        #post-content h2 { font-size: 1.2rem; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        #post-content h3 { font-size: 1rem; }

        #post-content p { color: var(--muted-foreground); margin-bottom: 1em; font-size: 0.95rem; }
        #post-content p strong { color: var(--foreground); font-weight: 600; }

        #post-content ul, #post-content ol {
            padding-left: 1.4em;
            margin-bottom: 1em;
            color: var(--muted-foreground);
            font-size: 0.95rem;
        }
        #post-content li { margin-bottom: 0.35em; }
        #post-content li strong { color: var(--foreground); }

        #post-content a { color: var(--accent-foreground); text-decoration: underline; }

        #post-content blockquote {
            border-left: 3px solid var(--border);
            padding-left: 16px;
            color: var(--muted-foreground);
            font-style: italic;
            margin: 1.2em 0;
        }

        #post-content pre {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 16px 18px;
            overflow-x: auto;
            margin: 1.2em 0;
            font-size: 0.83rem;
        }
        #post-content code {
            font-family: var(--font-mono, 'Courier New', monospace);
            font-size: 0.85em;
            background: var(--secondary);
            padding: 1px 5px;
            border-radius: 2px;
        }
        #post-content pre code {
            background: transparent;
            padding: 0;
            font-size: inherit;
        }

        #post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.2em 0;
            font-size: 0.875rem;
        }
        #post-content th {
            background: var(--secondary);
            color: var(--foreground);
            font-weight: 600;
            text-align: left;
            padding: 8px 12px;
            border: 1px solid var(--border);
        }
        #post-content td {
            padding: 8px 12px;
            border: 1px solid var(--border);
            color: var(--muted-foreground);
        }
        #post-content tbody tr:nth-child(even) { background: var(--muted); }

        #post-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2em 0;
        }

        /* Loading / error states */
        #loading { color: var(--muted-foreground); font-size: 0.9rem; padding: 20px 0; }
        #error { color: var(--destructive); font-size: 0.9rem; padding: 20px 0; }

        /* Footer */
        footer.section { font-size: 0.82rem; color: var(--muted-foreground); }
    </style>
</head>
<body>

    <button id="darkToggle" onclick="toggleDarkMode()"><i data-lucide="moon"></i></button>

    <!-- Top nav -->
    <nav class="post-nav">
        <a class="btn" href="index.html">
            <i data-lucide="arrow-left"></i> All Posts
        </a>
        <a class="btn" href="../index.html">
            <i data-lucide="home"></i> Portfolio
        </a>
    </nav>

    <!-- Post header (populated by JS) -->
    <div class="post-header" id="post-header">
        <p id="loading">Loading post…</p>
    </div>

    <!-- Rendered markdown content -->
    <article id="post-content"></article>

    <!-- Footer -->
    <footer class="section" style="margin-top:60px;">
        <p>© 2026 Krrishvardhan Vyas — <a href="index.html">Blog</a> · <a href="../index.html">Portfolio</a></p>
    </footer>

    <script>
        // ------------------------------------------------------------------
        // Frontmatter parser
        // Extracts YAML-lite frontmatter between --- delimiters.
        // Returns { meta: {key: value, ...}, content: '...' }
        // ------------------------------------------------------------------
        function parseFrontmatter(raw) {
            const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
            if (!match) return { meta: {}, content: raw };
            const meta = {};
            match[1].split('\n').forEach(line => {
                const colon = line.indexOf(':');
                if (colon > -1) {
                    const key = line.slice(0, colon).trim();
                    const val = line.slice(colon + 1).trim();
                    if (key) meta[key] = val;
                }
            });
            return { meta, content: match[2] };
        }

        // ------------------------------------------------------------------
        // Load and render the post requested via ?post=slug query param
        // ------------------------------------------------------------------
        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('post');

            if (!slug) {
                showError('No post specified. <a href="index.html">Go back to the blog.</a>');
                return;
            }

            // Sanitise slug — only allow alphanumeric, hyphens, underscores
            if (!/^[a-zA-Z0-9_-]+$/.test(slug)) {
                showError('Invalid post identifier.');
                return;
            }

            try {
                const response = await fetch(`posts/${slug}.md`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const raw = await response.text();
                renderPost(raw);
            } catch (err) {
                showError(`Could not load post "<strong>${slug}</strong>". <a href="index.html">Go back to the blog.</a>`);
            }
        }

        function renderPost(raw) {
            const { meta, content } = parseFrontmatter(raw);

            // Update page title
            if (meta.title) document.title = `${meta.title} — Krrishvardhan Vyas`;

            // Build header
            const header = document.getElementById('post-header');
            const tags = meta.tags
                ? meta.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('')
                : '';

            header.innerHTML = `
                <div class="post-meta">
                    ${meta.date ? `<span><i data-lucide="calendar" style="width:12px;height:12px;display:inline;vertical-align:middle;margin-right:3px;"></i>${meta.date}</span>` : ''}
                </div>
                <h1 class="post-title">${meta.title || 'Untitled Post'}</h1>
                ${tags ? `<div class="tags">${tags}</div>` : ''}
            `;

            // Render markdown (first h1 is already shown via meta.title, so we
            // strip the first # heading from the content to avoid duplication)
            const stripped = content.replace(/^#[^#][^\n]*\n/, '');
            document.getElementById('post-content').innerHTML = marked.parse(stripped);

            lucide.createIcons();
        }

        function showError(msg) {
            const header = document.getElementById('post-header');
            header.innerHTML = `<p id="error">${msg}</p>`;
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark');
            const btn = document.getElementById('darkToggle');
            btn.innerHTML = isDark ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
            lucide.createIcons();
            localStorage.setItem('darkMode', isDark ? 'on' : 'off');
        }

        window.onload = function () {
            if (localStorage.getItem('darkMode') === 'on') {
                document.body.classList.add('dark');
                document.getElementById('darkToggle').innerHTML = '<i data-lucide="sun"></i>';
            }
            lucide.createIcons();
            loadPost();
        };
    </script>

</body>
</html>
