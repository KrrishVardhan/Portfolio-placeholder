<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post — Krrishvardhan Vyas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../root.css">
    <link rel="stylesheet" href="post.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- marked.js for Markdown → HTML rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <button id="darkToggle" onclick="toggleDarkMode()"><i data-lucide="moon"></i></button>

    <!-- Top nav -->
    <nav class="post-nav">
        <a class="btn" href="index.html">
            <i data-lucide="arrow-left"></i> All Posts
        </a>
        <a class="btn" href="../index.html">
            <i data-lucide="home"></i> Portfolio
        </a>
    </nav>

    <!-- Post header (populated by JS) -->
    <div class="post-header" id="post-header">
        <p id="loading">Loading post…</p>
    </div>

    <!-- Rendered markdown content -->
    <article id="post-content"></article>

    <!-- Footer -->
    <footer class="section" style="margin-top:60px;">
        <p>© 2026 Krrishvardhan Vyas — <a href="index.html">Blog</a> · <a href="../index.html">Portfolio</a></p>
    </footer>

    <script>
        // ------------------------------------------------------------------
        // Custom marked renderer — handles Obsidian image syntax:
        //   1. Prepends "Blog/" to relative image paths
        //   2. Parses Obsidian resize syntax  ![alt|width](src)  →  <img width="...">
        // ------------------------------------------------------------------
        const renderer = new marked.Renderer();
        renderer.image = function(href, title, text) {
            const src = (typeof href === 'object' && href !== null) ? (href.href || href) : href;
            const pipeMatch = (text || '').match(/^(.*?)\|(\d+)$/);
            const alt = pipeMatch ? pipeMatch[1].trim() : (text || '');
            const width = pipeMatch ? ` width="${pipeMatch[2]}"` : '';
            const resolvedSrc = /^https?:\/\/|^\//.test(src) ? src : `Blog/${src}`;
            const titleAttr = title ? ` title="${title}"` : '';
            return `<img src="${resolvedSrc}" alt="${alt}"${width}${titleAttr} style="max-width:100%;height:auto;">`;
        };
        marked.use({ renderer });

        // ------------------------------------------------------------------
        // Frontmatter parser
        // Extracts YAML-lite frontmatter between --- delimiters.
        // Returns { meta: {key: value, ...}, content: '...' }
        // ------------------------------------------------------------------
        function parseFrontmatter(raw) {
            const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
            if (!match) return { meta: {}, content: raw };
            const meta = {};
            let lastKey = null;
            match[1].split('\n').forEach(line => {
                const listItem = line.match(/^\s+-\s+(.+)$/);
                if (listItem && lastKey) {
                    if (!Array.isArray(meta[lastKey])) meta[lastKey] = [];
                    meta[lastKey].push(listItem[1].trim());
                    return;
                }
                const colon = line.indexOf(':');
                if (colon > -1) {
                    const key = line.slice(0, colon).trim();
                    const val = line.slice(colon + 1).trim();
                    if (key) {
                        meta[key] = val || null;
                        lastKey = key;
                    }
                }
            });
            return { meta, content: match[2] };
        }

        // ------------------------------------------------------------------
        // Load and render the post requested via ?post=slug query param
        // ------------------------------------------------------------------
        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('post');

            if (!slug) {
                showError('No post specified. <a href="index.html">Go back to the blog.</a>');
                return;
            }

            // Sanitise slug — only allow alphanumeric, hyphens, underscores
            if (!/^[a-zA-Z0-9_-]+$/.test(slug)) {
                showError('Invalid post identifier.');
                return;
            }

            try {
                const response = await fetch(`Blog/${slug}.md`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const raw = await response.text();
                renderPost(raw);
            } catch (err) {
                showError(`Could not load post "<strong>${slug}</strong>". <a href="index.html">Go back to the blog.</a>`);
            }
        }

        function renderPost(raw) {
            const { meta, content } = parseFrontmatter(raw);

            // Update page title
            if (meta.title) document.title = `${meta.title} — Krrishvardhan Vyas`;

            // Build header
            const header = document.getElementById('post-header');
            const tagList = Array.isArray(meta.tags)
                ? meta.tags
                : (meta.tags ? meta.tags.split(',').map(t => t.trim()) : []);
            const tags = tagList.map(t => `<span class="tag">${t}</span>`).join('');

            header.innerHTML = `
                <div class="post-meta">
                    ${meta.date ? `<span><i data-lucide="calendar" style="width:12px;height:12px;display:inline;vertical-align:middle;margin-right:3px;"></i>${meta.date}</span>` : ''}
                </div>
                <h1 class="post-title">${meta.title || 'Untitled Post'}</h1>
                ${tags ? `<div class="tags">${tags}</div>` : ''}
            `;

            // Render markdown (first h1 is already shown via meta.title, so we
            // strip the first # heading from the content to avoid duplication)
            const stripped = content.replace(/^#[^#][^\n]*\n/, '');
            document.getElementById('post-content').innerHTML = marked.parse(stripped);

            lucide.createIcons();
        }

        function showError(msg) {
            const header = document.getElementById('post-header');
            header.innerHTML = `<p id="error">${msg}</p>`;
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark');
            const btn = document.getElementById('darkToggle');
            btn.innerHTML = isDark ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
            lucide.createIcons();
            localStorage.setItem('darkMode', isDark ? 'on' : 'off');
        }

        window.onload = function () {
            if (localStorage.getItem('darkMode') === 'on') {
                document.body.classList.add('dark');
                document.getElementById('darkToggle').innerHTML = '<i data-lucide="sun"></i>';
            }
            lucide.createIcons();
            loadPost();
        };
    </script>

</body>
</html>
