<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Krrishvardhan Vyas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../root.css">
    <link rel="stylesheet" href="index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- Header -->
    <header class="section">
        <button id="darkToggle" onclick="toggleDarkMode()"><i data-lucide="moon"></i></button>
        <p style="font-size:0.8rem; color:var(--muted-foreground); margin-bottom:4px;">
            <a href="../index.html" style="display:inline-flex;align-items:center;gap:4px;">
                <i data-lucide="arrow-left" style="width:13px;height:13px;"></i> Back to Portfolio
            </a>
        </p>
        <h1>Blog</h1>
        <p>Thoughts on web development, design, and the occasional rabbit hole.</p>
    </header>

    <!-- Posts Section -->
    <section class="section">
        <h2><i data-lucide="file-text"></i> Posts</h2>
        <div id="postsList"></div>
    </section>

    <!-- Footer -->
    <footer class="section">
        <p>© 2026 Krrishvardhan Vyas. <a href="../index.html">Back to Portfolio</a></p>
    </footer>

    <script>
        // -----------------------------------------------------------------
        // Post registry — add a new entry here for each new post you write.
        // Drop the .md file in blog/Blog/ and register it below.
        // -----------------------------------------------------------------
        const posts = [
            {
                slug: 'getting-started-with-web-dev',
                title: 'Getting Started with Web Development',
                date: 'March 7, 2026',
                tags: ['webdev', 'html', 'css', 'javascript'],
                excerpt: "A beginner's guide to jumping into the world of web development — tools, resources, and the mindset needed to succeed."
            }, {
                slug: 'arrow-functions',          // must match the filename (no .md)
                title: 'Arrow Functions',
                date: 'March 8, 2026',
                tags: ['webdev', 'javascript'],
                excerpt: 'Arrow Functions in JavaScript.'
            },
            // Add more posts here:
            // {
            //   slug: 'your-post-filename-without-extension',
            //   title: 'Your Post Title',
            //   date: 'Month DD, YYYY',
            //   tags: ['tag1', 'tag2'],
            //   excerpt: 'Short description shown on the listing page.'
            // }
        ];

        function renderPosts() {
            const list = document.getElementById('postsList');

            if (posts.length === 0) {
                list.innerHTML = '<p class="empty-state">No posts yet. Check back soon!</p>';
                return;
            }

            list.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-card-meta">
                        <span><i data-lucide="calendar" style="width:12px;height:12px;display:inline;vertical-align:middle;margin-right:3px;"></i>${post.date}</span>
                    </div>
                    <h3>${post.title}</h3>
                    <p>${post.excerpt}</p>
                    <div class="tags">${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    <a class="btn" href="post.html?post=${encodeURIComponent(post.slug)}">
                        <i data-lucide="book-open"></i> Read Post
                    </a>
                </div>
            `).join('');

            lucide.createIcons();
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark');
            const btn = document.getElementById('darkToggle');
            btn.innerHTML = isDark ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
            lucide.createIcons();
            localStorage.setItem('darkMode', isDark ? 'on' : 'off');
        }

        window.onload = function () {
            if (localStorage.getItem('darkMode') === 'on') {
                document.body.classList.add('dark');
                document.getElementById('darkToggle').innerHTML = '<i data-lucide="sun"></i>';
            }
            lucide.createIcons();
            renderPosts();
        };
    </script>

</body>

</html>
