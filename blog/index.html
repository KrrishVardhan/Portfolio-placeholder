<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Krrishvardhan Vyas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../root.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans, 'Inter', system-ui, sans-serif);
            font-size: 15px;
            line-height: 1.65;
            letter-spacing: -0.01em;
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px;
            background: var(--background);
            color: var(--foreground);
            transition: background 0.3s, color 0.3s;
        }

        a { color: var(--accent-foreground); text-decoration: none; }
        a:hover { text-decoration: underline; }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: var(--foreground);
            margin-top: 8px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0em;
            margin-bottom: 18px;
            color: var(--foreground);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section {
            margin: 44px 0;
            padding-bottom: 44px;
            border-bottom: 1px solid var(--border);
        }

        .section:last-child { border-bottom: none; padding-bottom: 0; }

        /* Header */
        header.section { padding-top: 8px; }
        header > p {
            font-size: 0.875rem;
            color: var(--muted-foreground);
            margin-top: 4px;
        }
        header > div {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* Buttons */
        .btn {
            background: var(--secondary);
            color: var(--secondary-foreground);
            padding: 9px 17px;
            border: none;
            cursor: pointer;
            margin: 0;
            border-radius: 2px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s, transform 0.1s;
            text-decoration: none;
        }
        .btn:hover { background: var(--foreground); color: var(--background); text-decoration: none; }
        .btn:active { transform: scale(0.97); }

        /* Dark mode toggle */
        #darkToggle {
            float: right;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 7px 9px;
            cursor: pointer;
            color: var(--foreground);
            display: inline-flex;
            align-items: center;
            transition: background 0.15s;
        }
        #darkToggle:hover { background: var(--secondary); }
        #darkToggle svg { width: 16px; height: 16px; }

        /* Post cards */
        .post-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 20px 22px;
            margin: 12px 0;
            transition: border-color 0.15s, transform 0.15s;
        }
        .post-card:hover { border-color: var(--foreground); transform: translateY(-1px); }

        .post-card-meta {
            font-size: 0.78rem;
            color: var(--muted-foreground);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .post-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .post-card p {
            color: var(--muted-foreground);
            font-size: 0.875rem;
            margin-bottom: 14px;
        }

        .tag {
            display: inline-block;
            background: var(--secondary);
            color: var(--secondary-foreground);
            border-radius: 2px;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 2px 8px;
            letter-spacing: 0.02em;
        }

        .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }

        .empty-state {
            color: var(--muted-foreground);
            font-size: 0.9rem;
            padding: 32px 0;
        }

        /* Footer */
        footer.section { text-align: left; }
        footer p { font-size: 0.82rem; color: var(--muted-foreground); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="section">
        <button id="darkToggle" onclick="toggleDarkMode()"><i data-lucide="moon"></i></button>
        <p style="font-size:0.8rem; color:var(--muted-foreground); margin-bottom:4px;">
            <a href="../index.html" style="display:inline-flex;align-items:center;gap:4px;">
                <i data-lucide="arrow-left" style="width:13px;height:13px;"></i> Back to Portfolio
            </a>
        </p>
        <h1>Blog</h1>
        <p>Thoughts on web development, design, and the occasional rabbit hole.</p>
    </header>

    <!-- Posts Section -->
    <section class="section">
        <h2><i data-lucide="file-text"></i> Posts</h2>
        <div id="postsList"></div>
    </section>

    <!-- Footer -->
    <footer class="section">
        <p>© 2026 Krrishvardhan Vyas. <a href="../index.html">Back to Portfolio</a></p>
    </footer>

    <script>
        // -----------------------------------------------------------------
        // Post registry — add a new entry here for each new post you write.
        // Drop the .md file in blog/posts/ and register it below.
        // -----------------------------------------------------------------
        const posts = [
            {
                slug: 'getting-started-with-web-dev',
                title: 'Getting Started with Web Development',
                date: 'March 7, 2026',
                tags: ['webdev', 'html', 'css', 'javascript'],
                excerpt: "A beginner's guide to jumping into the world of web development — tools, resources, and the mindset needed to succeed."
            }
            // Add more posts here:
            // {
            //   slug: 'your-post-filename-without-extension',
            //   title: 'Your Post Title',
            //   date: 'Month DD, YYYY',
            //   tags: ['tag1', 'tag2'],
            //   excerpt: 'Short description shown on the listing page.'
            // }
        ];

        function renderPosts() {
            const list = document.getElementById('postsList');

            if (posts.length === 0) {
                list.innerHTML = '<p class="empty-state">No posts yet. Check back soon!</p>';
                return;
            }

            list.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-card-meta">
                        <span><i data-lucide="calendar" style="width:12px;height:12px;display:inline;vertical-align:middle;margin-right:3px;"></i>${post.date}</span>
                    </div>
                    <h3>${post.title}</h3>
                    <p>${post.excerpt}</p>
                    <div class="tags">${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    <a class="btn" href="post.html?post=${encodeURIComponent(post.slug)}">
                        <i data-lucide="book-open"></i> Read Post
                    </a>
                </div>
            `).join('');

            lucide.createIcons();
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark');
            const btn = document.getElementById('darkToggle');
            btn.innerHTML = isDark ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
            lucide.createIcons();
            localStorage.setItem('darkMode', isDark ? 'on' : 'off');
        }

        window.onload = function () {
            if (localStorage.getItem('darkMode') === 'on') {
                document.body.classList.add('dark');
                document.getElementById('darkToggle').innerHTML = '<i data-lucide="sun"></i>';
            }
            lucide.createIcons();
            renderPosts();
        };
    </script>

</body>
</html>
